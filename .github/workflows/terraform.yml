# This is a basic workflow to help you get started with Actions
name: learn-aws-patch-manager-apply

# Controls when the action will run. Invokes the workflow on push events but only for the main branch
on:
  workflow_dispatch:

env:
  
  AWS_REGION : "us-east-1" #Change to reflect your Region  

# Permission can be added at job level or workflow level    
permissions:
      id-token: write   # This is required for requesting the JWT
      contents: write    # This is required for actions/checkout
jobs:
  AssumeRoleAndCallIdentity:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3  
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::762595429056:role/GithubActions #change to reflect your IAM role’s ARN
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      # Hello from AWS: WhoAmI
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        
      # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Terraform Init
        run: |
          # Pull existing state from aws/destroy/main branch if it exists
          echo "Checking for existing Terraform state..."
          git fetch origin aws/destroy/main 2>/dev/null || echo "aws/destroy/main branch doesn't exist yet"
          if git show-branch remotes/origin/aws/destroy/main 2>/dev/null; then
              echo "Found aws/destroy/main branch, checking for state files..."
              git checkout aws/destroy/main
              if [ -d "state" ] && [ -f "state/terraform.tfstate" ]; then
                  echo "Found existing state, copying to working directory..."
                  cp state/terraform.tfstate ./terraform.tfstate
              fi
              git checkout ${{ github.ref_name }}
          fi
          
          terraform init
          terraform fmt
          terraform validate
          terraform plan
          echo "Checking existing resources..."
          ROLE_NAME=$(grep -A2 'resource "aws_iam_role"' main.tf | grep 'name' | head -1 | sed 's/.*"\(.*\)".*/\1/' | sed "s/\${var.project_tag}/$(grep 'project_tag' terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')/")
          echo "Detected role: $ROLE_NAME"
          if [ -n "$ROLE_NAME" ] && aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
              echo "Role $ROLE_NAME exists - will use existing"
              terraform apply --auto-approve -var="use_existing_iam=true"
          else
              echo "Role $ROLE_NAME doesn't exist - will create new"
              terraform apply --auto-approve -var="use_existing_iam=false"
          fi
        working-directory: infra_terraform

      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/davidawcloudsecurity/learn-aws-patch-manager.git                   
          # Get the latest commit hash
          COMMIT_HASH=$(git rev-parse --short HEAD)          
          
          # Fetch the latest changes from the remote 'aws/destroy/main' branch
          git status
          echo "git fetch"
          git fetch origin aws/destroy/main
          git add main.tf
          git commit -m "random-${COMMIT_HASH}" --allow-empty
          cp main.tf main.tf.origin
          git stash
          echo "git checkout"
          git checkout aws/destroy/main
          echo "git reset to remote"
          git reset --hard origin/aws/destroy/main
          mv main.tf.origin main.tf
          if [ -f terraform.tfstate ]; then
            mv terraform.tfstate state/
            git add state
          fi
          git add main.tf
          git commit -m "random-${COMMIT_HASH}" --allow-empty
          # Push the changes to the 'aws/destroy/main' branch
          git push origin aws/destroy/main
        working-directory: infra_terraform

      - name: Push State on Failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/davidawcloudsecurity/learn-aws-patch-manager.git
          git fetch origin aws/destroy/main
          git stash
          git checkout aws/destroy/main
          git reset --hard origin/aws/destroy/main
          if [ -f ../infra_terraform/terraform.tfstate ]; then
            cp ../infra_terraform/terraform.tfstate state/terraform.tfstate
            git add state
            git commit -m "state-after-failed-apply" --allow-empty
            git push origin aws/destroy/main
          fi
        working-directory: infra_terraform

      - name: Terraform Destroy on Failure
        if: failure()
        run: |
          terraform destroy -auto-approve -input=false
          
          # Dynamically find roles/profiles created by this project
          PROJECT_TAG=$(grep 'project_tag' terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          echo "Looking for IAM roles/profiles matching project: $PROJECT_TAG"
          
          # Find all roles matching project tag
          ROLES=$(aws iam list-roles --query "Roles[?contains(RoleName, '${PROJECT_TAG}')].RoleName" --output text)
          for ROLE_NAME in $ROLES; do
              [ -z "$ROLE_NAME" ] && continue
              echo "=== Cleaning up role: $ROLE_NAME ==="
              
              # Remove from any instance profiles
              PROFILES=$(aws iam list-instance-profiles-for-role --role-name "$ROLE_NAME" --query 'InstanceProfiles[*].InstanceProfileName' --output text 2>/dev/null)
              for PROFILE in $PROFILES; do
                  [ -z "$PROFILE" ] || [ "$PROFILE" = "None" ] && continue
                  echo "Removing role from instance profile: $PROFILE"
                  aws iam remove-role-from-instance-profile --instance-profile-name "$PROFILE" --role-name "$ROLE_NAME" 2>/dev/null || true
              done
              
              # Detach managed policies
              ATTACHED=$(aws iam list-attached-role-policies --role-name "$ROLE_NAME" --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null)
              for POLICY_ARN in $ATTACHED; do
                  [ -z "$POLICY_ARN" ] || [ "$POLICY_ARN" = "None" ] && continue
                  echo "Detaching policy: $POLICY_ARN"
                  aws iam detach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN" 2>/dev/null || true
              done
              
              # Delete inline policies
              INLINE=$(aws iam list-role-policies --role-name "$ROLE_NAME" --query 'PolicyNames' --output text 2>/dev/null)
              for POLICY in $INLINE; do
                  [ -z "$POLICY" ] || [ "$POLICY" = "None" ] && continue
                  echo "Deleting inline policy: $POLICY"
                  aws iam delete-role-policy --role-name "$ROLE_NAME" --policy-name "$POLICY" 2>/dev/null || true
              done
              
              echo "Deleting role: $ROLE_NAME"
              aws iam delete-role --role-name "$ROLE_NAME" 2>/dev/null || true
          done
          
          # Find and delete all instance profiles matching project tag
          INSTANCE_PROFILES=$(aws iam list-instance-profiles --query "InstanceProfiles[?contains(InstanceProfileName, '${PROJECT_TAG}')].InstanceProfileName" --output text)
          for PROFILE in $INSTANCE_PROFILES; do
              [ -z "$PROFILE" ] || [ "$PROFILE" = "None" ] && continue
              echo "Deleting instance profile: $PROFILE"
              aws iam delete-instance-profile --instance-profile-name "$PROFILE" 2>/dev/null || true
          done
          
          echo "Cleanup complete"
        working-directory: infra_terraform
