# This is a basic workflow to help you get started with Actions
name: learn-aws-patch-manager-apply

# Controls when the action will run. Invokes the workflow on push events but only for the main branch
on:
  push:
    branches:
      - SR-216
  workflow_dispatch:

env:
  
  AWS_REGION : "us-east-1" #Change to reflect your Region  

# Permission can be added at job level or workflow level    
permissions:
      id-token: write   # This is required for requesting the JWT
      contents: write    # This is required for actions/checkout
jobs:
  AssumeRoleAndCallIdentity:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3  
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::421041021814:role/GithubActions #change to reflect your IAM role’s ARN
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      # Hello from AWS: WhoAmI
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        
      # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Terraform Init
        run: |
          # Pull existing state from destroy/main branch if it exists
          echo "Checking for existing Terraform state..."
          git fetch origin destroy/main 2>/dev/null || echo "destroy/main branch doesn't exist yet"
          if git show-branch remotes/origin/destroy/main 2>/dev/null; then
              echo "Found destroy/main branch, checking for state files..."
              git stash
              git checkout destroy/main
              echo "git reset to remote"
              git reset --hard origin/destroy/main              
              if [ -d "state" ] && [ -f "state/terraform.tfstate" ]; then
                  echo "Found existing state, copying to working directory..."
                  cp state/terraform.tfstate ./terraform.tfstate
              fi
              git reset --hard
              git clean -fd      
              git checkout ${{ github.ref_name }}
          fi
          
          terraform init
          terraform fmt
          terraform validate
          
          # Delete any existing IAM roles/profiles matching project_tag before apply

          # Convert terraform.tfvars from Windows to Linux line endings
          sed -i 's/\r//' terraform.tfvars
          
          # Now extract PROJECT_TAG cleanly
          PROJECT_TAG=$(grep 'project_tag' terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          echo "Cleaning up existing IAM resources matching: $PROJECT_TAG"
          
          # Delete matching IAM roles (pipe JSON through grep to avoid pagination issues)
          ROLES=$(aws iam list-roles --query "Roles[*].RoleName" --output json | grep "$PROJECT_TAG" | sed 's/[",]//g')

          for ROLE_NAME in $ROLES; do
              echo "Found existing role: $ROLE_NAME"
              # Remove from instance profiles first
              for PROFILE in $(aws iam list-instance-profiles-for-role --role-name "$ROLE_NAME" --query 'InstanceProfiles[*].InstanceProfileName' --output text); do
                  echo "  Removing role from profile: $PROFILE"
                  aws iam remove-role-from-instance-profile --instance-profile-name "$PROFILE" --role-name "$ROLE_NAME"
              done
              # Detach managed policies
              for POLICY_ARN in $(aws iam list-attached-role-policies --role-name "$ROLE_NAME" --query 'AttachedPolicies[*].PolicyArn' --output text); do
                  echo "  Detaching policy: $POLICY_ARN"
                  aws iam detach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN"
              done
              # Delete inline policies
              for POLICY in $(aws iam list-role-policies --role-name "$ROLE_NAME" --query 'PolicyNames' --output text); do
                  aws iam delete-role-policy --role-name "$ROLE_NAME" --policy-name "$POLICY"
              done
              echo "  Deleting role: $ROLE_NAME"
              aws iam delete-role --role-name "$ROLE_NAME"
          done
          
          # Delete matching instance profiles
          PROFILES=$(aws iam list-instance-profiles --output json | grep -o '"InstanceProfileName": "[^"]*'"$PROJECT_TAG"'[^"]*"' | sed 's/"InstanceProfileName": "//;s/"//g')
          for PROFILE_NAME in $PROFILES; do
              echo "Deleting instance profile: $PROFILE_NAME"
              aws iam delete-instance-profile --instance-profile-name "$PROFILE_NAME"
          done
          
          echo "Cleanup complete. Running terraform apply..."
          terraform plan
          terraform apply --auto-approve
        working-directory: infra_terraform

      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/davidawcloudsecurity/learn-aws-patch-manager.git                   
          # Get the latest commit hash
          COMMIT_HASH=$(git rev-parse --short HEAD)          
          
          # Fetch the latest changes from the remote 'destroy/main' branch
          git status
          echo "git fetch"
          git fetch origin destroy/main
          git add main.tf
          git commit -m "random-${COMMIT_HASH}" --allow-empty
          cp main.tf main.tf.origin
          git stash
          echo "git checkout"
          git checkout destroy/main
          echo "git reset to remote"
          git reset --hard origin/destroy/main
          mv main.tf.origin main.tf
          if [ -f terraform.tfstate ]; then
            mv terraform.tfstate state/
            git add state
          fi
          git add main.tf
          git commit -m "random-${COMMIT_HASH}" --allow-empty
          # Push the changes to the 'destroy/main' branch
          git push origin destroy/main
        working-directory: infra_terraform

      - name: Push State on Failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/davidawcloudsecurity/learn-aws-patch-manager.git
          git fetch origin destroy/main
          git stash
          git checkout destroy/main
          git reset --hard origin/destroy/main
          if [ -f ../infra_terraform/terraform.tfstate ]; then
            cp ../infra_terraform/terraform.tfstate state/terraform.tfstate
            git add state
            git commit -m "state-after-failed-apply" --allow-empty
            git push origin destroy/main
          fi
        working-directory: infra_terraform

      - name: Terraform Destroy on Failure
        if: failure()
        run: |
          terraform destroy -auto-approve -input=false
          
          # Dynamically find roles/profiles created by this project
          # Delete any existing IAM roles/profiles matching project_tag before apply

          # Convert terraform.tfvars from Windows to Linux line endings
          sed -i 's/\r//' terraform.tfvars
          
          # Now extract PROJECT_TAG cleanly
          PROJECT_TAG=$(grep 'project_tag' terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          echo "Cleaning up existing IAM resources matching: $PROJECT_TAG"
          
          # Delete matching IAM roles (pipe JSON through grep to avoid pagination issues)
          ROLES=$(aws iam list-roles --query "Roles[*].RoleName" --output json | grep "$PROJECT_TAG" | sed 's/[",]//g')

          for ROLE_NAME in $ROLES; do
              echo "Found existing role: $ROLE_NAME"
              # Remove from instance profiles first
              for PROFILE in $(aws iam list-instance-profiles-for-role --role-name "$ROLE_NAME" --query 'InstanceProfiles[*].InstanceProfileName' --output text); do
                  echo "  Removing role from profile: $PROFILE"
                  aws iam remove-role-from-instance-profile --instance-profile-name "$PROFILE" --role-name "$ROLE_NAME"
              done
              # Detach managed policies
              for POLICY_ARN in $(aws iam list-attached-role-policies --role-name "$ROLE_NAME" --query 'AttachedPolicies[*].PolicyArn' --output text); do
                  echo "  Detaching policy: $POLICY_ARN"
                  aws iam detach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN"
              done
              # Delete inline policies
              for POLICY in $(aws iam list-role-policies --role-name "$ROLE_NAME" --query 'PolicyNames' --output text); do
                  aws iam delete-role-policy --role-name "$ROLE_NAME" --policy-name "$POLICY"
              done
              echo "  Deleting role: $ROLE_NAME"
              aws iam delete-role --role-name "$ROLE_NAME"
          done
          
          # Delete matching instance profiles
          PROFILES=$(aws iam list-instance-profiles --output json | grep -o '"InstanceProfileName": "[^"]*'"$PROJECT_TAG"'[^"]*"' | sed 's/"InstanceProfileName": "//;s/"//g')
          for PROFILE_NAME in $PROFILES; do
              echo "Deleting instance profile: $PROFILE_NAME"
              aws iam delete-instance-profile --instance-profile-name "$PROFILE_NAME"
          done
          
          echo "Cleanup complete"
        working-directory: infra_terraform
